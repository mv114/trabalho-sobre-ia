<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="icon.png">
    <title>O futuro da IA, está em suas mãos</title>
    <style>
        body {
            min-height: 150vh;
        }

        ::-webkit-scrollbar {
            width: 12px;
        }

        ::-webkit-scrollbar-track {
            background: green;
        }

        ::-webkit-scrollbar-thumb {
            background: #323683;
            border-radius: 14px;
        }

        ::-webkit-scrollbar-thumb:hover {
            opacity: .95;
        }
    </style>
</head>
<body>
    <div class="caixa-principal">
        <br>
        <h1>maria vitoria chanan</h1>
        <br>
        <h2>Você decide o futuro da IA</h2>
        <div class="caixa-perguntas"></div>
        <div class="caixa-alternativas"></div>
        <div class="caixa-resultado">
            <p class="texto-resultado"></p>
        </div>
        <br>
        
        <div class="relogio">
            <div>
                <span id="horas">00</span>
                <span class="tempo">Horas</span>
            </div>
    
            <div>
                <span id="minutos">00</span>
                <span class="tempo">Minutos</span>
            </div>
    
            <div>
                <span id="segundos">00</span>
                <span class="tempo">Segundos</span>
            </div>
        </div>
        
        <footer>
            <a href="https://github.com/mv114" target="_blank" rel="noopener noreferrer">
                <img src="github.png" alt="GitHub">
                <p>Github</p>
            </a>
            <a href="https://www.youtube.com/" target="_blank" rel="noopener noreferrer">
                <img src="youtube.png" alt="YouTube">
                <p>Youtube</p>
            </a>
            <a href="https://api.whatsapp.com/send?phone=5543999385851" target="_blank" rel="noopener noreferrer">
                <img src="Whatsapp.png" alt="WhatsApp">
                <p>Whatsapp</p>
            </a>
            <a href="https://www.deepseek.com/" target="_blank" rel="noopener noreferrer">
                <img src="deepseek-color.png" alt="Deepseek">
                <p>Deepseek</p>
            </a>
        </footer>
    </div>
    
    <script src="script.js"></script>
    <script>
        // Função para atualizar o relógio
        function atualizarRelogio() {
            var agora = new Date();
            var horas = agora.getHours().toString().padStart(2, '0');
            var minutos = agora.getMinutes().toString().padStart(2, '0');
            var segundos = agora.getSeconds().toString().padStart(2, '0');
            
            document.getElementById('horas').textContent = horas;
            document.getElementById('minutos').textContent = minutos;
            document.getElementById('segundos').textContent = segundos;
        }
        
        // Atualizar relógio a cada segundo
        setInterval(atualizarRelogio, 1000);
        atualizarRelogio();
    </script>
</body>
</html>
